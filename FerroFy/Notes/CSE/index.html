<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE | FerroFy Notes</title>

    <link rel="shortcut icon" href="../Files/Images/Favicon/Main.png" type="image/x-icon">
    <link rel="stylesheet" href="../Files/CSS/Common/Vari.css">
    <link rel="stylesheet" href="../Files/CSS/Common/Header.css">
    <link rel="stylesheet" href="../Files/CSS/Common/Footer.css">
    <link rel="stylesheet" href="../Files/CSS/Common/Main.css">
    <link rel="stylesheet" href="CSE.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div id="Heading_And_Nav">
            <h1>FerroFy Notes</h1>
            <nav id="Header_Nav"></nav>
        </div>

        <div id="Search_And_Account">
            <div id="Header_Search_Bar">
                <i class="fa-solid fa-magnifying-glass Search_Icon"></i>
                <input type="text" id="Search_Input" placeholder="Search Topics ...">
            </div>
            <img src="../Files/Images/Profile/VPX.gif" alt="_Account_">
        </div>

        <div id="Menu_Bar">
            <span id="Menu_Bar_Lines_1"></span>
            <span id="Menu_Bar_Lines_2"></span>
            <span id="Menu_Bar_Lines_3"></span>
        </div>

        <div id="Menu_Side_Bar">
            <div id="Menu_Profile_And_Search">
                <img src="../Files/Images/Profile/VPX.gif" alt="_Account_" id="Menu_Profile_Logo">
                <div id="Menu_Search_Bar">
                    <i class="fa-solid fa-magnifying-glass Search_Icon"></i>
                    <input type="text" placeholder="Search Topics ...">
                </div>
            </div>
            <div id="Menu_Hr"></div>
            <nav id="Menu_Nav"></nav>
        </div>
    </header>

    <div id="Menu_Overlay"></div>

    <main>
        <div id="CSE_Hero">
            <div id="CSE_Hero_Badge">
                <i class="fa-solid fa-laptop-code"></i>
                CSE
            </div>
            <h1 id="Main_Heading">Heading</h1>
            <p id="Main_Sub_Heading">Heading Para</p>
        </div>

        <div id="All_Sections">

            <section class="Topic_Section" id="Section_Tools">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap">
                        <i class="fa-solid fa-wrench"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title">Basic Tools</h2>
                        <p class="Section_Desc">Some Popular CSE Tools</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Tools_Cards"></div>
            </section>

            <section class="Topic_Section" id="Section_Languages">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap Lang_Icon_Wrap">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title Lang_Section_Title">Topic 2</h2>
                        <p class="Section_Desc">Para 2</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Languages_Cards"></div>
            </section>

            <section class="Topic_Section" id="Section_Fields">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap Field_Icon_Wrap">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title Field_Section_Title">Topic 3</h2>
                        <p class="Section_Desc">Para 3</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Fields_Cards"></div>
            </section>

        </div>
    </main>

    <footer>
        <div id="Footer_Logo" class="Footer_Box">
            <h1>FerroFy Notes</h1>
            <p>Turning Knowledge Into Practical Learnings</p>
        </div>

        <div class="Footer_Box">
            <h1>Quick Links</h1>
            <ul id="Quick_Link"></ul>
        </div>

        <div id="Icons" class="Footer_Box">
            <h1 id="Social_Link_Heading">Social Links</h1>
            <a class="Link_Icon" id="Icon_Github" href="https://github.com/FerroFy" target="_blank"><i
                    class="fa-brands fa-github"></i></a>
            <a class="Link_Icon" id="Icon_LinkedIn" href="https://www.linkedin.com/in/ferrofy/" target="_blank"><i
                    class="fa-brands fa-linkedin"></i></a>
            <a class="Link_Icon" id="Icon_Code" href="https://github.com/ferrofy/Notes" target="_blank"><i
                    class="fa-solid fa-code"></i></a>
            <a class="Link_Icon" id="Icon_Share"><i class="fa-solid fa-share-nodes"></i></a>
        </div>
    </footer>

    <script src="../Files/JS/Common/Header.js"></script>
    <script src="../Files/JS/Common/Footer.js"></script>
    <script src="CSE.js"></script>
</body>

</html>
