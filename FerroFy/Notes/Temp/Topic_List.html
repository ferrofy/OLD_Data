<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Topics List | FerroFy</title>

    <link rel="shortcut icon" href="../Files/Images/Favicon/Main.png" type="image/x-icon">
    <link rel="stylesheet" href="../Files/CSS/Common/Vari.css">
    <link rel="stylesheet" href="../Files/CSS/Common/Header.css">
    <link rel="stylesheet" href="../CSE/CSE.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <main>
        <div id="CSE_Hero">
            <div id="CSE_Hero_Badge">
                <i class="fa-solid fa-laptop-code"></i>
                CSE
            </div>
            <h1 id="Main_Heading">Heading</h1>
            <p id="Main_Sub_Heading">Heading Para</p>
        </div>

        <div id="All_Sections">

            <section class="Topic_Section" id="Section_Tools">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap">
                        <i class="fa-solid fa-wrench"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title">Topic 1</h2>
                        <p class="Section_Desc"> Para 1</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Tools_Cards"></div>
            </section>

            <section class="Topic_Section" id="Section_Languages">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap Lang_Icon_Wrap">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title Lang_Section_Title">Topic 2</h2>
                        <p class="Section_Desc"> Para 2</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Languages_Cards"></div>
            </section>

            <section class="Topic_Section" id="Section_Fields">
                <div class="Section_Header">
                    <div class="Section_Icon_Wrap Field_Icon_Wrap">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <div class="Section_Title_Wrap">
                        <h2 class="Section_Title Field_Section_Title">Topic 3</h2>
                        <p class="Section_Desc"> Para 3</p>
                    </div>
                </div>
                <div class="Cards_Row" id="Fields_Cards"></div>
            </section>

        </div>
    </main>
    
    <script src="../Files/JS/Common/Header.js"></script>
    <script src="../Files/JS/Common/Footer.js"></script>
    <script src="Topic_List.js"></script>
</body>

</html>
